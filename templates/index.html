<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codeslice</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f1f5f9;
  --surface: #ffffff;
  --sf2:     #f8fafc;
  --border:  #e2e8f0;
  --accent:  #4f46e5;
  --a2:      #6366f1;
  --ok:      #059669;
  --warn:    #d97706;
  --err:     #dc2626;
  --text:    #1e293b;
  --sub:     #475569;
  --muted:   #94a3b8;
  --r:       7px;
}

body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  font-size: 14px; line-height: 1.5; height: 100vh; overflow: hidden;
}

/* ── Header ── */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
header h1 { font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
header h1 em { font-style: normal; color: var(--accent); }
header p  { font-size: 12px; color: var(--muted); margin-left: 12px; }

/* ── Layout ── */
.layout { display: grid; grid-template-columns: 370px 1fr; height: calc(100vh - 53px); }
.left  { background: var(--surface); border-right: 1px solid var(--border); padding: 16px 18px; overflow-y: auto; }
.right { display: flex; flex-direction: column; overflow: hidden; }

/* ── Form ── */
.sec { margin-bottom: 14px; }
.sec-title { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 6px; }
.field-label { font-size: 12px; color: var(--sub); margin-bottom: 3px; display: block; }
input[type=text], input[type=password], textarea, select {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--r);
  font-size: 13px; color: var(--text); background: var(--surface); outline: none;
  font-family: inherit; transition: border-color .15s, box-shadow .15s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
textarea { resize: vertical; min-height: 68px; }
select option { background: var(--surface); }
hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Env key badge */
.env-ok { font-size: 11px; color: var(--ok); margin-top: 4px; display: none; align-items: center; gap: 3px; }

/* ── Drop zone ── */
.dz {
  border: 1.5px dashed var(--border); border-radius: var(--r); padding: 13px;
  text-align: center; cursor: pointer; color: var(--muted); font-size: 12px;
  transition: all .15s; position: relative; min-height: 62px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
}
.dz:hover, .dz.over { border-color: var(--accent); background: rgba(79,70,229,.03); }
.dz.set  { border-style: solid; border-color: var(--accent); }
.dz img  { max-height: 80px; max-width: 100%; border-radius: 4px; object-fit: contain; }
.dz .rm  { position: absolute; top: 5px; right: 5px; background: rgba(220,38,38,.1);
           border: none; color: var(--err); cursor: pointer; border-radius: 4px; padding: 1px 6px; font-size: 11px; }
#ss-in { display: none; }

/* ── Toggle ── */
.tog-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px; background: var(--sf2); border: 1px solid var(--border); border-radius: var(--r);
}
.tog-label { font-size: 13px; font-weight: 500; }
.tog-desc  { font-size: 11px; color: var(--muted); }
.tog { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
.tog input { display: none; }
.tk {
  position: absolute; inset: 0; background: #cbd5e1; border-radius: 18px; cursor: pointer; transition: background .2s;
}
.tk::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.tog input:checked + .tk { background: var(--accent); }
.tog input:checked + .tk::after { transform: translateX(16px); }

/* ── Buttons ── */
.btn-primary {
  width: 100%; padding: 9px; background: var(--accent); color: white;
  border: none; border-radius: var(--r); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s; letter-spacing: .1px;
}
.btn-primary:hover:not(:disabled) { opacity: .88; }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

.btn-xs {
  padding: 3px 9px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 12px; background: var(--surface); color: var(--sub);
  cursor: pointer; white-space: nowrap; transition: background .1s;
}
.btn-xs:hover { background: var(--sf2); }

.btn-dl {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; background: var(--ok); color: #fff;
  border: none; border-radius: var(--r); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .15s; letter-spacing: .1px;
}
.btn-dl:hover:not(:disabled) { opacity: .88; }
.btn-dl:disabled { opacity: .45; cursor: not-allowed; }

/* ── Tabs ── */
.tab-bar {
  display: none; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 18px; flex-shrink: 0;
}
.tab-btn {
  padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: color .15s, border-color .15s; white-space: nowrap;
}
.tab-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.badge {
  display: inline-block; font-size: 10px; font-weight: 700; border-radius: 8px;
  padding: 0 5px; margin-left: 4px; min-width: 16px; text-align: center;
  line-height: 16px; background: var(--accent); color: #fff;
}
.badge.g { background: var(--ok); }

/* ── Tab content ── */
.tab-c { display: none; flex: 1; overflow-y: auto; padding: 14px 18px; }
.tab-c.on { display: block; }

/* ── Stats ── */
.stats { display: flex; gap: 8px; margin-bottom: 12px; }
.stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; text-align: center; }
.stat-n { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-l { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── Tree toolbar ── */
.tree-tb {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.tree-tb-hint { font-size: 12px; color: var(--muted); }
.tree-tb-actions { display: flex; gap: 5px; }

/* ── Tree container ── */
.tree-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 4px 0; overflow: hidden;
}

/* ── Tree rows ── */
.dir-row {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; cursor: pointer; user-select: none;
  border-radius: 4px; font-size: 13px; font-weight: 500; color: var(--text);
  transition: background .1s;
}
.dir-row:hover { background: var(--sf2); }

.file-row {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px; cursor: pointer; border-radius: 4px;
  font-size: 12px; font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Consolas, monospace;
  color: var(--sub); transition: background .1s;
}
.file-row:hover { background: var(--sf2); }
.file-row.off { opacity: .38; text-decoration: line-through; }

.tree-kids { margin-left: 16px; border-left: 1.5px solid var(--border); padding-left: 6px; }

.chev { font-size: 9px; color: var(--muted); width: 10px; flex-shrink: 0; line-height: 1; }
.ico  { font-size: 13px; flex-shrink: 0; line-height: 1; }
.lbl  { flex: 1; word-break: break-all; }

.fcb  { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.fcb:disabled { cursor: not-allowed; opacity: .55; }

.tag  { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
.tag.imp { background: rgba(217,119,6,.1); color: var(--warn); }
.tag.ai  { background: rgba(79,70,229,.1); color: var(--accent); }

/* ── Browse search ── */
.srch-wrap { position: relative; margin-bottom: 9px; }
.srch-wrap input { padding-left: 28px; }
.srch-ico { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }

/* ── Progress ── */
.prog-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.prog-item { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--sub); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #cbd5e1; }
.prog-item.run .dot { background: var(--accent); animation: blink 1s ease-in-out infinite; }
.prog-item.ok  .dot { background: var(--ok); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Error ── */
.err-box { background: #fef2f2; border: 1px solid #fecaca; color: var(--err); padding: 10px 13px; border-radius: var(--r); font-size: 13px; margin-top: 10px; }

/* ── Download bar ── */
.dl-bar {
  display: none; background: var(--surface); border-top: 1px solid var(--border);
  padding: 11px 18px; flex-shrink: 0; align-items: center; justify-content: space-between;
}
.dl-info { font-size: 13px; color: var(--muted); }
.dl-info strong { color: var(--text); font-weight: 600; }

/* ── Empty ── */
.empty { text-align: center; color: var(--muted); padding: 60px 20px; margin: auto; }
.empty .ico { font-size: 38px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<header>
  <h1>🔪 Code<em>slice</em></h1>
  <p>智能提取与问题相关的代码文件，打包为 ZIP 供 AI 分析</p>
</header>

<div class="layout">

  <!-- ── Left ── -->
  <div class="left">

    <div class="sec">
      <div class="sec-title">API 配置</div>
      <label class="field-label">DeepSeek API Key</label>
      <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
      <div class="env-ok" id="env-ok">✓ 已从环境变量加载，留空则使用环境变量中的 Key</div>
      <div style="margin-top:10px">
        <label class="field-label">模型</label>
        <select id="model">
          <option value="deepseek-v4-flash">deepseek-v4-flash（推荐 · 快速省钱）</option>
          <option value="deepseek-v4-pro" selected>deepseek-v4-pro（更强 · 更贵）</option>
        </select>
      </div>
    </div>

    <hr>

    <div class="sec">
      <div class="sec-title">仓库路径</div>
      <input type="text" id="repo-path" placeholder="/Users/you/projects/my-repo 或 E:\Code\my-repo">
    </div>

    <div class="sec">
      <div class="sec-title">问题描述</div>
      <textarea id="question" placeholder="描述你遇到的问题，如：点击保存后动画配置丢失，报错见截图..."></textarea>
    </div>

    <div class="sec">
      <div class="sec-title">截图（可选）</div>
      <div class="dz" id="dz" onclick="document.getElementById('ss-in').click()">
        <div id="dz-hint">📎 拖拽截图 · 点击上传 · <kbd style="font-size:11px">Ctrl+V</kbd> 粘贴</div>
        <img id="ss-prev" style="display:none">
        <button class="rm" id="ss-rm" style="display:none" onclick="rmSS(event)">✕</button>
      </div>
      <input type="file" id="ss-in" accept="image/*">
    </div>

    <div class="sec">
      <div class="sec-title">高级选项</div>
      <div class="tog-row">
        <div>
          <div class="tog-label">扫描 import 引用链</div>
          <div class="tog-desc">将相关文件的直接依赖也加入结果</div>
        </div>
        <label class="tog">
          <input type="checkbox" id="use-imp">
          <span class="tk"></span>
        </label>
      </div>
    </div>

    <button class="btn-primary" id="go-btn" onclick="go()">开始分析</button>

  </div>

  <!-- ── Right ── -->
  <div class="right">

    <div class="empty" id="empty">
      <div class="ico">🗂️</div>
      <p>填写左侧信息后点击「开始分析」</p>
      <p style="margin-top:4px;font-size:12px">AI 将分两阶段筛选与问题相关的文件</p>
    </div>

    <!-- shown after analysis starts -->
    <div id="ui" style="display:none;flex:1;flex-direction:column;overflow:hidden">

      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn on" onclick="tab('ai')" id="t-ai">
          AI 推荐 <span class="badge" id="b-ai">0</span>
        </button>
        <button class="tab-btn" onclick="tab('browse')" id="t-browse">
          手动添加 <span class="badge g" id="b-manual" style="display:none">0</span>
        </button>
      </div>

      <!-- progress tab -->
      <div class="tab-c on" id="tc-prog" style="padding-top:18px">
        <ul class="prog-list" id="prog-list"></ul>
        <div id="err-box" style="display:none"></div>
      </div>

      <!-- AI results tab -->
      <div class="tab-c" id="tc-ai">
        <div class="stats" id="stats"></div>
        <div class="tree-tb">
          <span class="tree-tb-hint">取消勾选可从 ZIP 中排除</span>
          <div class="tree-tb-actions">
            <button class="btn-xs" onclick="expAll('ai-tree')">展开全部</button>
            <button class="btn-xs" onclick="colAll('ai-tree')">折叠全部</button>
          </div>
        </div>
        <div class="tree-box" id="ai-tree"></div>
      </div>

      <!-- Browse tab -->
      <div class="tab-c" id="tc-browse">
        <div class="srch-wrap">
          <span class="srch-ico">🔍</span>
          <input type="text" id="srch" placeholder="输入关键词过滤文件路径..." oninput="onSrch()">
        </div>
        <div class="tree-tb" id="browse-tb">
          <span class="tree-tb-hint" id="browse-hint"></span>
          <div class="tree-tb-actions" id="browse-acts">
            <button class="btn-xs" onclick="expAll('browse-tree')">展开全部</button>
            <button class="btn-xs" onclick="colAll('browse-tree')">折叠全部</button>
          </div>
        </div>
        <div class="tree-box" id="browse-tree"></div>
      </div>

    </div>

    <div class="dl-bar" id="dl-bar">
      <div class="dl-info">
        已选 <strong id="dl-n">0</strong> 个文件
        <span id="dl-manual-hint" style="display:none;margin-left:6px">（含手动 <strong id="dl-m">0</strong> 个）</span>
      </div>
      <button class="btn-dl" id="dl-btn" onclick="download()" disabled>⬇ 下载 ZIP</button>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let ssB64 = null, ssMime = 'image/png';
let repoPath = '', allFiles = [], aiSet = new Set(), added = new Set();
let hasEnv = false, evtSrc = null, progMap = {};

// ── Config ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const d = await (await fetch('/config')).json();
    if (d.has_env_key) {
      hasEnv = true;
      document.getElementById('env-ok').style.display = 'flex';
      document.getElementById('api-key').placeholder = '留空使用环境变量中的 Key · 或在此输入覆盖';
    }
  } catch {}
})();

// ── Screenshot ─────────────────────────────────────────────────────────────────
function setSS(f) {
  ssMime = f.type || 'image/png';
  const r = new FileReader();
  r.onload = e => {
    ssB64 = e.target.result.split(',')[1];
    document.getElementById('ss-prev').src = e.target.result;
    document.getElementById('ss-prev').style.display = 'block';
    document.getElementById('dz-hint').style.display = 'none';
    document.getElementById('ss-rm').style.display = 'block';
    document.getElementById('dz').classList.add('set');
  };
  r.readAsDataURL(f);
}
function rmSS(e) {
  e.stopPropagation(); ssB64 = null;
  document.getElementById('ss-prev').style.display = 'none';
  document.getElementById('dz-hint').style.display = 'block';
  document.getElementById('ss-rm').style.display = 'none';
  document.getElementById('dz').classList.remove('set');
  document.getElementById('ss-in').value = '';
}
document.getElementById('ss-in').addEventListener('change', e => { if (e.target.files[0]) setSS(e.target.files[0]); });
const dzEl = document.getElementById('dz');
dzEl.addEventListener('dragover', e => { e.preventDefault(); dzEl.classList.add('over'); });
dzEl.addEventListener('dragleave', () => dzEl.classList.remove('over'));
dzEl.addEventListener('drop', e => {
  e.preventDefault(); dzEl.classList.remove('over');
  const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) setSS(f);
});
document.addEventListener('paste', e => {
  for (const it of (e.clipboardData?.items || [])) if (it.type.startsWith('image/')) { setSS(it.getAsFile()); break; }
});

// ── Tabs ───────────────────────────────────────────────────────────────────────
function tab(name) {
  ['ai','browse'].forEach(n => {
    document.getElementById('t-' + n).classList.toggle('on', n === name);
    document.getElementById('tc-' + n).classList.toggle('on', n === name);
  });
}

// ── Progress ───────────────────────────────────────────────────────────────────
function addProg(stage, msg) {
  const list = document.getElementById('prog-list');
  const done = stage.endsWith('_done');
  if (progMap[stage]) {
    progMap[stage].className = 'prog-item ' + (done ? 'ok' : 'run');
    progMap[stage].querySelector('.msg').textContent = msg;
    return;
  }
  Object.values(progMap).forEach(el => { if (el.classList.contains('run')) el.className = 'prog-item ok'; });
  const li = document.createElement('li');
  li.className = 'prog-item ' + (done ? 'ok' : 'run');
  li.innerHTML = `<span class="dot"></span><span class="msg">${msg}</span>`;
  list.appendChild(li);
  progMap[stage] = li;
}
function progDone() { Object.values(progMap).forEach(el => el.className = 'prog-item ok'); }

// ── Analyze ────────────────────────────────────────────────────────────────────
async function go() {
  const apiKey = document.getElementById('api-key').value.trim();
  repoPath = document.getElementById('repo-path').value.trim();
  const q = document.getElementById('question').value.trim();
  const model = document.getElementById('model').value;
  const useImp = document.getElementById('use-imp').checked;

  if (!repoPath || !q) { alert('请填写仓库路径和问题描述'); return; }
  if (!apiKey && !hasEnv) { alert('请填写 API Key 或配置环境变量 CODESLICE_DEEPSEEK_API_KEY'); return; }

  progMap = {}; aiSet = new Set(); added = new Set(); allFiles = [];
  document.getElementById('empty').style.display = 'none';
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('prog-list').innerHTML = '';
  document.getElementById('tab-bar').style.display = 'none';
  document.getElementById('dl-bar').style.display = 'none';
  ['tc-ai','tc-browse'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('tc-prog').classList.add('on');
  document.getElementById('ui').style.display = 'flex';
  document.getElementById('go-btn').disabled = true;
  document.getElementById('go-btn').textContent = '分析中...';
  if (evtSrc) { evtSrc.close(); evtSrc = null; }

  const jobId = crypto.randomUUID();
  const es = evtSrc = new EventSource(`/progress/${jobId}`);
  es.onmessage = e => {
    const m = JSON.parse(e.data);
    if      (m.type === 'progress') addProg(m.stage, m.message);
    else if (m.type === 'done')  { progDone(); showResults(m.result); resetBtn(); es.close(); }
    else if (m.type === 'error') { showErr(m.message); resetBtn(); es.close(); }
    else if (m.type === 'end')   es.close();
  };
  es.onerror = () => es.close();

  try {
    const res = await fetch('/analyze', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId, api_key: apiKey, repo_path: repoPath,
        question: q, model, screenshot: ssB64, screenshot_mime: ssMime, use_import_chain: useImp }),
    });
    if (!res.ok) { const d = await res.json(); showErr(d.error || '请求失败'); resetBtn(); es.close(); }
  } catch (err) { showErr('网络错误: ' + err.message); resetBtn(); es.close(); }
}
function resetBtn() {
  document.getElementById('go-btn').disabled = false;
  document.getElementById('go-btn').textContent = '开始分析';
}

// ── Show Results ───────────────────────────────────────────────────────────────
function showResults(result) {
  allFiles = result.all_files || [];
  aiSet    = new Set(result.final_files);
  repoPath = result.repo_path;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${result.total_files}</div><div class="stat-l">仓库总文件</div></div>
    <div class="stat"><div class="stat-n">${result.candidates_count}</div><div class="stat-l">第一阶段候选</div></div>
    <div class="stat"><div class="stat-n">${result.final_files.length}</div><div class="stat-l">AI 推荐文件</div></div>
  `;

  // Build AI tree (only final_files paths)
  const candidateSet = new Set(result.candidates || []);
  const aiEl = document.getElementById('ai-tree');
  aiEl.innerHTML = '';
  aiEl.appendChild(renderTree(buildTree(result.final_files), 0, {
    isChecked: () => true,
    isLocked:  () => false,
    onChange:  (fp, checked, row) => { row.classList.toggle('off', !checked); updDl(); },
    getTag:    fp => !candidateSet.has(fp) ? mkTag('import链', 'imp') : null,
  }));
  document.getElementById('b-ai').textContent = result.final_files.length;

  // Build browse tree (all files)
  buildBrowse();

  document.getElementById('tab-bar').style.display = 'flex';
  document.getElementById('dl-bar').style.display = 'flex';
  document.getElementById('tc-prog').classList.remove('on');
  tab('ai');
  updDl();
}

// ── Tree ───────────────────────────────────────────────────────────────────────
const EXT_ICON = { vue:'🟢', ts:'🔷', tsx:'🔷', js:'🟡', jsx:'🟡', mjs:'🟡', cjs:'🟡',
  py:'🐍', go:'🔵', rs:'🦀', css:'🎨', scss:'🎨', less:'🎨',
  html:'🌐', json:'📋', md:'📝', yaml:'📋', yml:'📋', toml:'📋',
  sh:'⚙️', env:'⚙️', sql:'🗄️', graphql:'💜', prisma:'🔺' };

function fileIcon(path) {
  const ext = path.split('.').pop().toLowerCase();
  return EXT_ICON[ext] || '📄';
}
function mkTag(txt, cls) {
  const t = document.createElement('span');
  t.className = 'tag ' + cls; t.textContent = txt; return t;
}

function buildTree(paths) {
  const root = { dirs: {}, files: [] };
  for (const p of paths) {
    const parts = p.split('/');
    let n = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const d = parts[i];
      if (!n.dirs[d]) n.dirs[d] = { dirs: {}, files: [], path: parts.slice(0, i + 1).join('/') };
      n = n.dirs[d];
    }
    n.files.push(p);
  }
  return root;
}

function renderTree(node, depth, opts) {
  const wrap = document.createElement('div');

  for (const [dName, dNode] of Object.entries(node.dirs).sort(([a], [b]) => a.localeCompare(b))) {
    const nodeEl = document.createElement('div');

    // dir row
    const row = document.createElement('div');
    row.className = 'dir-row';
    row.style.paddingLeft = (depth * 18 + 6) + 'px';

    const chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = '▼';
    const icon = document.createElement('span'); icon.className = 'ico'; icon.textContent = '📁';
    const lbl  = document.createElement('span'); lbl.className = 'lbl'; lbl.textContent = dName + '/';
    row.append(chev, icon, lbl);

    // children
    const kids = document.createElement('div');
    kids.className = 'tree-kids';
    kids.appendChild(renderTree(dNode, depth + 1, opts));

    row.addEventListener('click', () => {
      const col = kids.style.display === 'none';
      kids.style.display = col ? '' : 'none';
      chev.textContent = col ? '▼' : '▶';
    });

    nodeEl.append(row, kids);
    wrap.appendChild(nodeEl);
  }

  for (const fp of (node.files || []).sort()) {
    wrap.appendChild(mkFileRow(fp, depth, opts));
  }

  return wrap;
}

function mkFileRow(fp, depth, opts) {
  const row = document.createElement('div');
  row.className = 'file-row';
  row.style.paddingLeft = (depth * 18 + 6) + 'px';
  row.dataset.path = fp;

  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'fcb';
  cb.checked = opts.isChecked(fp);
  if (opts.isLocked?.(fp)) { cb.disabled = true; cb.title = '由 AI 推荐，请在「AI推荐」tab 取消'; }

  cb.addEventListener('change', e => { e.stopPropagation(); opts.onChange?.(fp, cb.checked, row); });

  const icon = document.createElement('span'); icon.className = 'ico'; icon.textContent = fileIcon(fp);
  const lbl  = document.createElement('span'); lbl.className = 'lbl'; lbl.textContent = fp.split('/').pop();

  row.append(cb, icon, lbl);

  const tag = opts.getTag?.(fp);
  if (tag) row.appendChild(tag);

  row.addEventListener('click', e => {
    if (e.target !== cb && !cb.disabled) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
  });

  return row;
}

function expAll(id) {
  const el = document.getElementById(id);
  el.querySelectorAll('.tree-kids').forEach(c => c.style.display = '');
  el.querySelectorAll('.chev').forEach(c => c.textContent = '▼');
}
function colAll(id) {
  const el = document.getElementById(id);
  el.querySelectorAll('.tree-kids').forEach(c => c.style.display = 'none');
  el.querySelectorAll('.chev').forEach(c => c.textContent = '▶');
}

// ── Browse ─────────────────────────────────────────────────────────────────────
const browseOpts = () => ({
  isChecked: fp => aiSet.has(fp) || added.has(fp),
  isLocked:  fp => aiSet.has(fp),
  onChange:  (fp, checked) => {
    if (aiSet.has(fp)) return;
    if (checked) added.add(fp); else added.delete(fp);
    updManualBadge(); updDl();
  },
  getTag: fp => aiSet.has(fp) ? mkTag('AI已选', 'ai') : null,
});

function buildBrowse() {
  const box = document.getElementById('browse-tree');
  box.innerHTML = '';
  box.appendChild(renderTree(buildTree(allFiles), 0, browseOpts()));
  document.getElementById('browse-hint').textContent = `共 ${allFiles.length} 个文件`;
}

function renderBrowseFlat(files) {
  const box = document.getElementById('browse-tree');
  box.innerHTML = '';
  const opts = browseOpts();
  files.slice(0, 300).forEach(fp => box.appendChild(mkFileRow(fp, 0, opts)));
  if (files.length > 300) {
    const note = document.createElement('div');
    note.style.cssText = 'font-size:12px;color:var(--muted);padding:8px 10px;';
    note.textContent = `还有 ${files.length - 300} 个结果，请缩小搜索范围`;
    box.appendChild(note);
  }
}

function onSrch() {
  const q = document.getElementById('srch').value.toLowerCase().trim();
  const acts = document.getElementById('browse-acts');
  if (q) {
    const hits = allFiles.filter(f => f.toLowerCase().includes(q));
    document.getElementById('browse-hint').textContent = `找到 ${hits.length} 个文件`;
    acts.style.display = 'none';
    renderBrowseFlat(hits);
  } else {
    acts.style.display = '';
    buildBrowse();
  }
}

function updManualBadge() {
  const n = [...added].filter(f => !aiSet.has(f)).length;
  const b = document.getElementById('b-manual');
  b.textContent = n; b.style.display = n ? 'inline-block' : 'none';
}

// ── Download ───────────────────────────────────────────────────────────────────
function getCheckedAI() {
  return [...document.querySelectorAll('#ai-tree .fcb:checked')]
    .map(cb => cb.closest('.file-row')?.dataset.path).filter(Boolean);
}
function updDl() {
  const ai = getCheckedAI();
  const manual = [...added].filter(f => !aiSet.has(f));
  const total = ai.length + manual.length;
  document.getElementById('dl-n').textContent = total;
  document.getElementById('dl-btn').disabled = total === 0;
  const hint = document.getElementById('dl-manual-hint');
  if (manual.length) { hint.style.display = 'inline'; document.getElementById('dl-m').textContent = manual.length; }
  else hint.style.display = 'none';
}

async function download() {
  const aiFiles = getCheckedAI();
  const manual  = [...added].filter(f => !aiSet.has(f));
  const files   = [...new Set([...aiFiles, ...manual])];
  if (!files.length) { alert('没有选中任何文件'); return; }

  const btn = document.getElementById('dl-btn');
  btn.disabled = true; btn.textContent = '打包中...';
  try {
    const res = await fetch('/redownload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_path: repoPath, files }),
    });
    if (!res.ok) { alert('下载失败: ' + await res.text()); return; }
    const blob = await res.blob();
    const repoName = repoPath.replace(/\\/g, '/').split('/').filter(Boolean).pop() || 'codeslice';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = repoName + '.zip'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (err) { alert('网络错误: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = '⬇ 下载 ZIP'; }
}

// ── Error ──────────────────────────────────────────────────────────────────────
function showErr(msg) {
  const b = document.getElementById('err-box');
  b.className = 'err-box'; b.textContent = '❌ ' + msg; b.style.display = 'block';
}
</script>
